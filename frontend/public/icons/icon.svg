<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle - Doraemon Blue -->
  <circle cx="256" cy="256" r="240" fill="#0096C7"/>
  <!-- Inner circle - white face area like Doraemon -->
  <circle cx="256" cy="280" r="160" fill="white"/>
  <!-- Pocket shape - the 4D Pocket -->
  <path d="M176 300 Q176 380 256 380 Q336 380 336 300" fill="none" stroke="#0096C7" stroke-width="8" stroke-linecap="round"/>
  <!-- Pocket opening arc -->
  <path d="M196 300 Q196 260 256 260 Q316 260 316 300" fill="#F0F9FF" stroke="#0096C7" stroke-width="4"/>
  <!-- 4D text -->
  <text x="230" y="240" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="64" fill="#0096C7">4D</text>
  <!-- Bell (Doraemon's bell) -->
  <circle cx="256" cy="340" r="16" fill="#FCD34D" stroke="#D97706" stroke-width="2"/>
  <line x1="256" y1="340" x2="256" y2="356" stroke="#D97706" stroke-width="2"/>
  <!-- Nose (small red circle) -->
  <circle cx="256" cy="196" r="12" fill="#EF4444"/>
</svg>
