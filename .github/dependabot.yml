version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/extension"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
